name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ghcr.io/mehfius/eteg-form-api:latest

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: ghcr.io/mehfius/eteg-form-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            if [ ! -d "eteg-form" ]; then
              git clone https://github.com/mehfius/eteg-form.git
            fi
            cd eteg-form
            git pull origin main
            sudo docker pull ghcr.io/mehfius/eteg-form-api:latest
            sudo docker pull ghcr.io/mehfius/eteg-form-app:latest
            sudo docker compose -f docker-compose.prod.yml up -d
